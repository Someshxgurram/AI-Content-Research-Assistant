<!DOCTYPE html>
<html>
<head>
    <title>AI Content Research Assistant</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>AI Content Research Assistant</h1>

<input type="text" id="topic" placeholder="Enter topic" style="width:100%; padding:10px;" />

<button onclick="generateContent()">Generate</button>

<div class="section">
    <h2>Research Insights</h2>
    <textarea id="research"></textarea>
</div>

<div class="section">
    <h2>LinkedIn Posts</h2>
    <textarea id="linkedin"></textarea>
</div>

<div class="section">
    <h2>Twitter Threads</h2>
    <textarea id="twitter"></textarea>
</div>

<script>
async function generateContent() {
    const topic = document.getElementById('topic').value;

    const response = await fetch('http://127.0.0.1:8000/generate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ topic })
    });

    const data = await response.json();

    document.getElementById('research').value = data.research;
    document.getElementById('linkedin').value = data.linkedin_posts;
    document.getElementById('twitter').value = data.twitter_threads;
}
</script>

</body>
</html>
